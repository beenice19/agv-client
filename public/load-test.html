<!doctype html>
<html>
<head>
  <title>AGV Load Test Panel</title>
  <style>
    body {
      margin: 0;
      background: #070b12;
      color: #f8fafc;
      font-family: Segoe UI, Arial, sans-serif;
      padding: 24px;
    }
    .card {
      max-width: 760px;
      margin: auto;
      background: #101827;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 22px;
    }
    h1 { margin-top: 0; }
    .row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .ok { color: #86efac; font-weight: 800; }
    .bad { color: #fca5a5; font-weight: 800; }
    button {
      margin-top: 18px;
      padding: 12px 16px;
      border: 0;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>AGV Viewer Load Test Panel</h1>

    <div class="row">
      <span>Main App</span>
      <span class="ok">http://127.0.0.1:5175</span>
    </div>

    <div class="row">
      <span>Main Server</span>
      <span>Port 8787</span>
    </div>

    <div class="row">
      <span>LiveKit Token Server</span>
      <span id="livekit">Checking...</span>
    </div>

    <div class="row">
      <span>Browser Memory</span>
      <span id="memory">Checking...</span>
    </div>

    <div class="row">
      <span>Viewer Test Status</span>
      <span class="ok">Ready</span>
    </div>

    <button onclick="window.open('/', '_blank')">Open AGV App</button>
  </div>

  <script>
    async function checkLiveKit() {
      try {
        const res = await fetch("http://127.0.0.1:8790/health");
        const data = await res.json();
        document.getElementById("livekit").className = data.ok ? "ok" : "bad";
        document.getElementById("livekit").textContent = data.ok ? "Healthy" : "Problem";
      } catch {
        document.getElementById("livekit").className = "bad";
        document.getElementById("livekit").textContent = "Offline";
      }
    }

    function checkMemory() {
      const el = document.getElementById("memory");
      if (performance.memory) {
        const used = Math.round(performance.memory.usedJSHeapSize / 1024 / 1024);
        el.textContent = used + " MB used";
      } else {
        el.textContent = "Not available";
      }
    }

    checkLiveKit();
    checkMemory();
    setInterval(checkLiveKit, 5000);
    setInterval(checkMemory, 5000);
  </script>
</body>
</html>
