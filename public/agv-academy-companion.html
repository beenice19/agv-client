<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AGV Academy Companion</title>

  <!-- Optional icon font. Program still works if internet is unavailable. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

  <style>
    :root {
      --agv-deep: #07111f;
      --agv-deeper: #030814;
      --agv-panel: #0d1b2f;
      --agv-panel-2: #122743;
      --agv-card: rgba(255, 255, 255, 0.055);
      --agv-card-strong: rgba(255, 255, 255, 0.085);
      --agv-border: rgba(255, 255, 255, 0.14);
      --agv-border-strong: rgba(242, 198, 74, 0.45);

      --agv-gold: #f2c64a;
      --agv-gold-soft: #fff0bd;
      --agv-gold-dark: #9c7515;
      --agv-teal: #16c6a3;
      --agv-teal-soft: rgba(22, 198, 163, 0.16);
      --agv-red: #ef6b6b;

      --text-main: #f7f3e8;
      --text-soft: #c7d2e3;
      --text-muted: #8ea0b8;

      --shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 10px;

      --font-sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text-main);
      font-family: var(--font-sans);
      background:
        radial-gradient(circle at top left, rgba(22, 198, 163, 0.22), transparent 34%),
        radial-gradient(circle at top right, rgba(242, 198, 74, 0.16), transparent 34%),
        linear-gradient(135deg, var(--agv-deeper), var(--agv-deep) 45%, #081528);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, transparent, rgba(255,255,255,0.035), transparent),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.018) 0 1px, transparent 1px 86px);
      opacity: 0.6;
      mask-image: linear-gradient(to bottom, black 0%, transparent 82%);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: var(--radius-sm);
      background: rgba(3, 8, 20, 0.72);
      color: var(--text-main);
      padding: 11px 12px;
      outline: none;
      transition: border 0.15s, box-shadow 0.15s, background 0.15s;
    }

    input:focus,
    textarea:focus {
      border-color: var(--agv-gold);
      box-shadow: 0 0 0 4px rgba(242, 198, 74, 0.14);
      background: rgba(5, 13, 28, 0.94);
    }

    textarea {
      resize: vertical;
      min-height: 88px;
    }

    ::placeholder {
      color: rgba(199, 210, 227, 0.55);
    }

    .app-shell {
      width: min(1180px, calc(100% - 28px));
      margin: 18px auto 32px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 28px;
      background: rgba(6, 14, 29, 0.72);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      overflow: hidden;
      min-height: calc(100vh - 50px);
      position: relative;
    }

    .header {
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 22px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.015)),
        linear-gradient(90deg, rgba(22,198,163,0.12), transparent 55%, rgba(242,198,74,0.08));
    }

    .brand-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      cursor: pointer;
      min-width: 0;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(135deg, rgba(242,198,74,0.96), rgba(22,198,163,0.84)),
        linear-gradient(135deg, var(--agv-gold), var(--agv-teal));
      color: #07111f;
      box-shadow: 0 12px 28px rgba(22,198,163,0.16);
      flex-shrink: 0;
      font-weight: 900;
      letter-spacing: -0.6px;
    }

    .brand-title {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .brand-title strong {
      font-size: 16px;
      line-height: 1.1;
      letter-spacing: -0.25px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-title span {
      font-size: 11px;
      color: var(--agv-gold-soft);
      letter-spacing: 1.6px;
      text-transform: uppercase;
      margin-top: 3px;
      opacity: 0.88;
      white-space: nowrap;
    }

    .crumb {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
      color: var(--text-muted);
      font-size: 14px;
    }

    .crumb-value {
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .page {
      padding: 26px;
    }

    .center-page {
      max-width: 780px;
      margin: 0 auto;
      padding: 54px 22px 64px;
    }

    .hero-panel {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(242,198,74,0.28);
      border-radius: 30px;
      padding: 34px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.025)),
        radial-gradient(circle at 90% 0%, rgba(242,198,74,0.23), transparent 40%),
        radial-gradient(circle at 10% 100%, rgba(22,198,163,0.18), transparent 36%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 11px;
      border: 1px solid rgba(242,198,74,0.34);
      border-radius: 999px;
      color: var(--agv-gold-soft);
      background: rgba(242,198,74,0.08);
      font-size: 12px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    h1, h2, h3, p {
      margin-top: 0;
    }

    h1 {
      font-size: clamp(34px, 5vw, 58px);
      line-height: 0.98;
      letter-spacing: -1.8px;
      margin-bottom: 16px;
    }

    h2 {
      font-size: 24px;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    p {
      color: var(--text-soft);
      line-height: 1.72;
    }

    .landing-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 26px;
    }

    .choice-card,
    .stat-card,
    .course-card,
    .lesson-card,
    .info-card,
    .empty-card {
      border: 1px solid var(--agv-border);
      border-radius: var(--radius-lg);
      background: var(--agv-card);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .choice-card {
      padding: 22px;
      min-height: 190px;
      cursor: pointer;
      transition: transform 0.16s, border 0.16s, background 0.16s;
    }

    .choice-card:hover {
      transform: translateY(-3px);
      border-color: var(--agv-border-strong);
      background: var(--agv-card-strong);
    }

    .choice-card.primary {
      border-color: rgba(242,198,74,0.48);
      background:
        linear-gradient(145deg, rgba(242,198,74,0.13), rgba(255,255,255,0.045));
    }

    .choice-icon {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: rgba(22,198,163,0.16);
      color: var(--agv-teal);
      font-size: 28px;
      margin-bottom: 18px;
    }

    .primary .choice-icon {
      background: rgba(242,198,74,0.17);
      color: var(--agv-gold);
    }

    .choice-card strong {
      display: block;
      font-size: 17px;
      margin-bottom: 7px;
    }

    .choice-card span {
      color: var(--text-soft);
      line-height: 1.55;
      font-size: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 10px 17px;
      color: var(--agv-deeper);
      background: linear-gradient(135deg, var(--agv-gold), #ffd86a);
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.12s, filter 0.12s, opacity 0.12s, background 0.12s;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .btn.secondary {
      color: var(--text-main);
      border-color: rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.075);
    }

    .btn.ghost {
      color: var(--text-soft);
      background: transparent;
      border-color: transparent;
    }

    .btn.danger {
      color: #ffe8e8;
      background: rgba(239,107,107,0.16);
      border-color: rgba(239,107,107,0.38);
    }

    .btn.teal {
      color: #03110e;
      background: linear-gradient(135deg, var(--agv-teal), #77f2d9);
    }

    .btn.small {
      padding: 7px 12px;
      font-size: 12px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 26px;
    }

    .stat-card {
      padding: 18px;
      background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.035));
    }

    .stat-label {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--text-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 7px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.8px;
    }

    .two-col {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 24px;
      align-items: start;
    }

    .section-title {
      color: var(--agv-gold-soft);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      margin-bottom: 11px;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .course-card {
      padding: 17px;
      cursor: pointer;
      transition: border 0.12s, background 0.12s, transform 0.12s;
    }

    .course-card:hover {
      border-color: rgba(242,198,74,0.42);
      background: var(--agv-card-strong);
      transform: translateY(-1px);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .course-title {
      font-size: 15px;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .course-sub {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 3px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 9px;
      background: rgba(22,198,163,0.14);
      color: #93ffe7;
      border: 1px solid rgba(22,198,163,0.24);
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .code-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    code.class-code {
      display: inline-flex;
      align-items: center;
      letter-spacing: 2.5px;
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--agv-deeper);
      background: linear-gradient(135deg, var(--agv-gold), var(--agv-gold-soft));
      border-radius: 9px;
      padding: 6px 10px;
      font-weight: 900;
    }

    .lesson-card {
      padding: 14px 16px;
    }

    .lesson-card.today {
      background: linear-gradient(145deg, rgba(22,198,163,0.18), rgba(255,255,255,0.04));
      border-color: rgba(22,198,163,0.48);
      border-left: 4px solid var(--agv-teal);
    }

    .lesson-card.past {
      opacity: 0.58;
    }

    .lesson-title {
      font-weight: 800;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .lesson-meta,
    .small-muted {
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .today-badge {
      margin-left: 8px;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 10px;
      letter-spacing: 0.8px;
      color: #06111f;
      background: var(--agv-teal);
      font-weight: 900;
      vertical-align: middle;
    }

    .empty-card {
      padding: 32px;
      text-align: center;
      border-style: dashed;
      color: var(--text-muted);
    }

    .info-card {
      padding: 20px;
      margin-bottom: 20px;
      background:
        linear-gradient(145deg, rgba(242,198,74,0.09), rgba(255,255,255,0.035));
    }

    .info-grid {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      align-items: center;
    }

    .field-label {
      display: block;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .field-block {
      margin-bottom: 16px;
    }

    .form-card {
      border: 1px solid var(--agv-border);
      border-radius: var(--radius-lg);
      background: var(--agv-card);
      padding: 22px;
      margin-bottom: 22px;
    }

    .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 14px;
    }

    .form-grid-3 {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 0 14px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      margin-bottom: 16px;
      overflow-x: auto;
    }

    .tab {
      border: none;
      color: var(--text-muted);
      background: transparent;
      cursor: pointer;
      padding: 11px 14px;
      border-bottom: 3px solid transparent;
      font-weight: 800;
      white-space: nowrap;
    }

    .tab.active {
      color: var(--agv-gold);
      border-bottom-color: var(--agv-gold);
    }

    .lesson-editor {
      border: 1px solid var(--agv-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--agv-card);
    }

    .lesson-editor-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 15px;
      cursor: pointer;
      background: rgba(255,255,255,0.025);
    }

    .lesson-editor.open .lesson-editor-head {
      background: rgba(242,198,74,0.08);
    }

    .lesson-number {
      display: grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      color: var(--agv-deeper);
      background: var(--agv-gold);
      font-size: 12px;
      font-weight: 900;
      flex-shrink: 0;
    }

    .lesson-editor-body {
      border-top: 1px solid rgba(255,255,255,0.12);
      padding: 16px;
      display: none;
    }

    .lesson-editor.open .lesson-editor-body {
      display: block;
    }

    .lesson-editor-title {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 800;
      font-size: 14px;
    }

    .entry-card {
      max-width: 430px;
      margin: 0 auto;
      border: 1px solid rgba(242,198,74,0.25);
      border-radius: 28px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      padding: 30px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.09);
    }

    .entry-icon {
      width: 58px;
      height: 58px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      color: var(--agv-gold);
      background: rgba(242,198,74,0.13);
      margin-bottom: 18px;
      font-size: 28px;
    }

    .student-code-input {
      text-align: center;
      letter-spacing: 7px;
      font-family: var(--font-mono);
      font-size: 25px;
      font-weight: 900;
      text-transform: uppercase;
      padding: 15px;
    }

    .student-banner {
      border-radius: 28px;
      border: 1px solid rgba(22,198,163,0.34);
      border-left: 5px solid var(--agv-teal);
      background:
        radial-gradient(circle at top right, rgba(242,198,74,0.18), transparent 34%),
        linear-gradient(145deg, rgba(22,198,163,0.16), rgba(255,255,255,0.04));
      padding: 24px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .resource-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--agv-gold-soft);
      background: rgba(242,198,74,0.1);
      border: 1px solid rgba(242,198,74,0.22);
      padding: 6px 10px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 800;
    }

    .lesson-actions {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .toast {
      position: fixed;
      z-index: 50;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%);
      color: var(--text-main);
      background: rgba(7, 17, 31, 0.95);
      border: 1px solid rgba(242,198,74,0.35);
      box-shadow: 0 20px 42px rgba(0,0,0,0.32);
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 14px;
      display: none;
    }

    .toast.show {
      display: block;
    }

    .split-actions {
      display: flex;
      justify-content: flex-end;
      gap: 9px;
      flex-wrap: wrap;
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .copy-note {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 16px;
    }

    .icon-fallback {
      font-weight: 900;
    }

    @media (max-width: 880px) {
      .two-col,
      .landing-grid,
      .stats-grid,
      .form-grid-2,
      .form-grid-3 {
        grid-template-columns: 1fr;
      }

      .header {
        align-items: flex-start;
        flex-direction: column;
      }

      .header-actions {
        justify-content: flex-start;
      }

      .page {
        padding: 18px;
      }

      .hero-panel {
        padding: 24px;
      }

      h1 {
        font-size: 38px;
      }
    }

    @media (max-width: 520px) {
      .app-shell {
        width: 100%;
        margin: 0;
        min-height: 100vh;
        border-radius: 0;
        border-left: none;
        border-right: none;
      }

      .header {
        padding: 14px;
      }

      .brand-title span {
        display: none;
      }

      .lesson-card .card-top,
      .lesson-card > div[style] {
        align-items: flex-start;
      }

      .btn {
        width: 100%;
      }

      .header-actions .btn,
      .lesson-actions .btn,
      .code-row .btn,
      .tabs .tab,
      .resource-link {
        width: auto;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell" id="app"></main>
  <div class="toast" id="toast"></div>

  <script>
    const KEY = "agv_courses_v1_html";
    const app = document.getElementById("app");
    const toastEl = document.getElementById("toast");

    let state = {
      courses: [],
      view: "landing",
      selectedId: null,
      editingId: null,
      form: null,
      codeInput: "",
      studentCourseId: null,
      copiedId: ""
    };

    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

    const genCode = () => {
      const c = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      return Array.from({ length: 6 }, () => c[Math.floor(Math.random() * c.length)]).join("");
    };

    const mkLesson = () => ({
      id: uid(),
      title: "",
      agvLink: "",
      date: "",
      time: "",
      handout: "",
      replay: "",
      notes: ""
    });

    const todayStr = () => new Date().toISOString().split("T")[0];

    const fmtDate = (d) => {
      if (!d) return "—";
      return new Date(d + "T12:00:00").toLocaleDateString("en-US", {
        month: "short",
        day: "numeric",
        year: "numeric"
      });
    };

    const escapeHtml = (value) => String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");

    const save = () => {
      localStorage.setItem(KEY, JSON.stringify(state.courses));
    };

    const load = () => {
      try {
        const raw = localStorage.getItem(KEY);
        state.courses = raw ? JSON.parse(raw) : [];
      } catch {
        state.courses = [];
      }
    };

    const showToast = (msg) => {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toastEl.classList.remove("show"), 2400);
    };

    const icon = (name, fallback) => `<i class="ti ${name}" aria-hidden="true"></i><span class="icon-fallback" style="display:none">${fallback || ""}</span>`;

    function header(crumb = "", actions = "") {
      return `
        <header class="header">
          <div class="brand-wrap">
            <div class="brand" onclick="goHome()">
              <div class="brand-mark">AGV</div>
              <div class="brand-title">
                <strong>AGV Academy Companion</strong>
                <span>The Show Is Now Open</span>
              </div>
            </div>
            ${crumb ? `<div class="crumb"><span>›</span><span class="crumb-value">${escapeHtml(crumb)}</span></div>` : ""}
          </div>
          ${actions ? `<div class="header-actions">${actions}</div>` : ""}
        </header>
      `;
    }

    function btn(label, onclick, variant = "", small = false, disabled = false, extraClass = "") {
      return `<button class="btn ${variant} ${small ? "small" : ""} ${extraClass}" onclick="${onclick}" ${disabled ? "disabled" : ""}>${label}</button>`;
    }

    function setView(view) {
      state.view = view;
      render();
    }

    function goHome() {
      state.view = "landing";
      state.selectedId = null;
      state.editingId = null;
      state.form = null;
      state.studentCourseId = null;
      render();
    }

    function getSelectedCourse() {
      return state.courses.find(c => c.id === state.selectedId) || null;
    }

    function getStudentCourse() {
      return state.courses.find(c => c.id === state.studentCourseId) || null;
    }

    function landing() {
      return `
        ${header()}
        <section class="center-page">
          <div class="hero-panel">
            <div class="eyebrow">${icon("ti-broadcast", "•")} AGV Companion Platform</div>
            <h1>Teach, schedule, share, and replay your AGV classes.</h1>
            <p>
              Build courses outside the main AGV platform, share secure student codes,
              organize handouts, post replay links, and open live AGV classes in a clean companion space.
              This keeps your working AGV broadcast system safe while giving teachers a separate education hub.
            </p>

            <div class="landing-grid">
              <div class="choice-card primary" onclick="openDashboard()">
                <div class="choice-icon">${icon("ti-chalkboard", "T")}</div>
                <strong>Teacher Studio</strong>
                <span>Create courses, add lesson schedules, attach handouts, post replay links, and copy student access links.</span>
              </div>

              <div class="choice-card" onclick="openStudentEntry()">
                <div class="choice-icon">${icon("ti-user-graduate", "S")}</div>
                <strong>Student Portal</strong>
                <span>Enter the teacher’s class code to see class dates, AGV live links, notes, handouts, and replays.</span>
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function openDashboard() {
      state.view = "dashboard";
      render();
    }

    function openStudentEntry() {
      state.view = "student-entry";
      render();
    }

    function dashboard() {
      const td = todayStr();
      const lessons = state.courses.flatMap(c =>
        (c.lessons || [])
          .filter(l => l.date && l.date >= td)
          .map(l => ({ ...l, courseName: c.title, cid: c.id }))
      ).sort((a, b) => (a.date || "").localeCompare(b.date || "")).slice(0, 7);

      const courseCards = state.courses.length ? state.courses.map(c => `
        <div class="course-card" onclick="openCourse('${c.id}')">
          <div class="card-top">
            <div style="min-width:0">
              <div class="course-title">${escapeHtml(c.title || "Untitled Course")}</div>
              <div class="course-sub">${escapeHtml(c.instructor || "No instructor")}</div>
            </div>
            <span class="pill">${(c.lessons || []).length} lessons</span>
          </div>
          <div class="code-row">
            <code class="class-code">${escapeHtml(c.studentCode)}</code>
            ${btn(`${icon(state.copiedId === c.id ? "ti-check" : "ti-copy", "")} ${state.copiedId === c.id ? "Copied" : "Copy Link"}`, `event.stopPropagation(); copyLink('${c.id}')`, "secondary", true)}
          </div>
        </div>
      `).join("") : `
        <div class="empty-card">
          <div style="font-size:34px; margin-bottom:10px;">${icon("ti-books", "📚")}</div>
          <div style="margin-bottom:14px;">No courses yet.</div>
          ${btn(`${icon("ti-plus", "+")} Create Course`, "openBuilder()", "", true)}
        </div>
      `;

      const upcomingCards = lessons.length ? lessons.map(l => {
        const isToday = l.date === td;
        return `
          <div class="lesson-card ${isToday ? "today" : ""}">
            <div class="lesson-title">
              ${escapeHtml(l.title || "Untitled Lesson")}
              ${isToday ? `<span class="today-badge">TODAY</span>` : ""}
            </div>
            <div class="lesson-meta">${escapeHtml(l.courseName)} · ${fmtDate(l.date)}${l.time ? " at " + escapeHtml(l.time) : ""}</div>
          </div>
        `;
      }).join("") : `
        <div class="empty-card">No upcoming lessons scheduled.</div>
      `;

      return `
        ${header("Teacher Dashboard", btn(`${icon("ti-plus", "+")} New Course`, "openBuilder()", "", true))}
        <section class="page">
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-label">${icon("ti-books", "")} Courses</div>
              <div class="stat-value">${state.courses.length}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">${icon("ti-calendar-event", "")} Lessons</div>
              <div class="stat-value">${state.courses.reduce((s, c) => s + (c.lessons || []).length, 0)}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">${icon("ti-clock", "")} Upcoming</div>
              <div class="stat-value">${lessons.length}</div>
            </div>
          </div>

          <div class="two-col">
            <div>
              <div class="section-title">My Courses</div>
              <div class="stack">${courseCards}</div>
            </div>
            <div>
              <div class="section-title">Upcoming Schedule</div>
              <div class="stack">${upcomingCards}</div>
            </div>
          </div>
        </section>
      `;
    }

    function openBuilder(id = null) {
      const course = id ? state.courses.find(c => c.id === id) : null;
      state.editingId = id;
      state.form = course ? JSON.parse(JSON.stringify(course)) : {
        title: "",
        description: "",
        instructor: "",
        lessons: [mkLesson()]
      };
      state.view = "builder";
      render();
    }

    function updateFormField(field, value) {
      state.form[field] = value;
    }

    function updateLessonField(id, field, value) {
      const lesson = state.form.lessons.find(l => l.id === id);
      if (lesson) lesson[field] = value;
    }

    function addLesson() {
      const lesson = mkLesson();
      state.form.lessons.push(lesson);
      render();
      setTimeout(() => {
        document.querySelectorAll(".lesson-editor").forEach(el => el.classList.remove("open"));
        const target = document.getElementById("lesson-editor-" + lesson.id);
        if (target) target.classList.add("open");
      }, 0);
    }

    function removeLesson(id) {
      state.form.lessons = state.form.lessons.filter(l => l.id !== id);
      render();
    }

    function toggleLesson(id) {
      const el = document.getElementById("lesson-editor-" + id);
      if (el) el.classList.toggle("open");
    }

    function builder() {
      const f = state.form;
      const canSave = (f.title || "").trim() && (f.instructor || "").trim();

      const lessons = f.lessons.length ? f.lessons.map((l, idx) => `
        <div class="lesson-editor ${idx === 0 ? "open" : ""}" id="lesson-editor-${l.id}">
          <div class="lesson-editor-head" onclick="toggleLesson('${l.id}')">
            <span class="lesson-number">${idx + 1}</span>
            <div class="lesson-editor-title">${escapeHtml(l.title || "Untitled lesson")}</div>
            <div class="small-muted">${l.date ? fmtDate(l.date) : ""}</div>
            ${l.agvLink ? `<span style="color:var(--agv-teal)">${icon("ti-video", "")}</span>` : ""}
            ${l.handout ? `<span style="color:var(--text-muted)">${icon("ti-file", "")}</span>` : ""}
            ${l.replay ? `<span style="color:var(--text-muted)">${icon("ti-player-play", "")}</span>` : ""}
            <button class="btn danger small" onclick="event.stopPropagation(); removeLesson('${l.id}')">${icon("ti-x", "x")}</button>
          </div>
          <div class="lesson-editor-body">
            <div class="form-grid-3">
              <div class="field-block">
                <label class="field-label">Lesson Title</label>
                <input value="${escapeHtml(l.title)}" oninput="updateLessonField('${l.id}', 'title', this.value)" placeholder="e.g. Week 1 — Foundation" />
              </div>
              <div class="field-block">
                <label class="field-label">Date</label>
                <input type="date" value="${escapeHtml(l.date)}" oninput="updateLessonField('${l.id}', 'date', this.value)" />
              </div>
              <div class="field-block">
                <label class="field-label">Time</label>
                <input type="time" value="${escapeHtml(l.time)}" oninput="updateLessonField('${l.id}', 'time', this.value)" />
              </div>
            </div>

            <div class="field-block">
              <label class="field-label">AGV Live Link</label>
              <input value="${escapeHtml(l.agvLink)}" oninput="updateLessonField('${l.id}', 'agvLink', this.value)" placeholder="Paste the AGV room, event, or share link" />
            </div>

            <div class="form-grid-2">
              <div class="field-block">
                <label class="field-label">Handout URL</label>
                <input value="${escapeHtml(l.handout)}" oninput="updateLessonField('${l.id}', 'handout', this.value)" placeholder="Link to PDF, Google Doc, file, or handout" />
              </div>
              <div class="field-block">
                <label class="field-label">Replay Link</label>
                <input value="${escapeHtml(l.replay)}" oninput="updateLessonField('${l.id}', 'replay', this.value)" placeholder="Recording or replay URL" />
              </div>
            </div>

            <div class="field-block">
              <label class="field-label">Student Notes</label>
              <textarea oninput="updateLessonField('${l.id}', 'notes', this.value)" placeholder="What should students know before class?">${escapeHtml(l.notes)}</textarea>
            </div>
          </div>
        </div>
      `).join("") : `
        <div class="empty-card">
          No lessons yet.
          <br><br>
          ${btn(`${icon("ti-plus", "+")} Add First Lesson`, "addLesson()", "", true)}
        </div>
      `;

      return `
        ${header(state.editingId ? "Edit Course" : "New Course", `
          ${btn("Cancel", "cancelBuilder()", "secondary", true)}
          ${btn(`${icon("ti-device-floppy", "")} ${state.editingId ? "Save Changes" : "Create Course"}`, "saveCourse()", "", true, !canSave)}
        `)}
        <section class="page" style="max-width:900px;">
          <div class="form-card">
            <div class="section-title">Course Info</div>
            <div class="form-grid-2">
              <div class="field-block">
                <label class="field-label">Course Title *</label>
                <input value="${escapeHtml(f.title)}" oninput="updateFormField('title', this.value)" placeholder="e.g. AGV Broadcast Training" />
              </div>
              <div class="field-block">
                <label class="field-label">Instructor Name *</label>
                <input value="${escapeHtml(f.instructor)}" oninput="updateFormField('instructor', this.value)" placeholder="Teacher or host name" />
              </div>
            </div>
            <div class="field-block">
              <label class="field-label">Description</label>
              <textarea oninput="updateFormField('description', this.value)" placeholder="What will students learn?">${escapeHtml(f.description)}</textarea>
            </div>
          </div>

          <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:12px;">
            <div class="section-title" style="margin:0;">Lessons (${f.lessons.length})</div>
            ${btn(`${icon("ti-plus", "+")} Add Lesson`, "addLesson()", "teal", true)}
          </div>

          <div class="stack">${lessons}</div>

          <div class="split-actions">
            ${btn("Cancel", "cancelBuilder()", "secondary")}
            ${btn(`${icon("ti-device-floppy", "")} ${state.editingId ? "Save Changes" : "Create Course"}`, "saveCourse()", "", false, !canSave)}
          </div>
        </section>
      `;
    }

    function cancelBuilder() {
      if (state.editingId) {
        state.selectedId = state.editingId;
        state.view = "detail";
      } else {
        state.view = "dashboard";
      }
      state.editingId = null;
      state.form = null;
      render();
    }

    function saveCourse() {
      const f = state.form;
      if (!(f.title || "").trim() || !(f.instructor || "").trim()) {
        showToast("Course title and instructor are required.");
        return;
      }

      let savedId = f.id;
      if (f.id) {
        state.courses = state.courses.map(c => c.id === f.id ? f : c);
      } else {
        savedId = uid();
        let code = genCode();
        while (state.courses.some(c => c.studentCode === code)) code = genCode();

        state.courses.push({
          ...f,
          id: savedId,
          studentCode: code,
          createdAt: Date.now()
        });
      }

      save();
      state.selectedId = savedId;
      state.editingId = null;
      state.form = null;
      state.view = "detail";
      render();
      showToast(f.id ? "Course updated." : "Course created.");
    }

    function openCourse(id) {
      state.selectedId = id;
      state.view = "detail";
      render();
    }

    function deleteCourse(id) {
      if (!confirm("Delete this course? Students will lose access to this class code.")) return;
      state.courses = state.courses.filter(c => c.id !== id);
      save();
      state.selectedId = null;
      state.view = "dashboard";
      render();
      showToast("Course deleted.");
    }

    function copyLink(id) {
      const c = state.courses.find(course => course.id === id);
      if (!c) return;

      const base = window.location.href.split("#")[0];
      const link = base + "#" + c.studentCode;

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(link)
          .then(() => {
            state.copiedId = id;
            render();
            showToast("Student link copied.");
            setTimeout(() => { state.copiedId = ""; render(); }, 1800);
          })
          .catch(() => showToast("Copy failed. Student code: " + c.studentCode));
      } else {
        showToast("Student code: " + c.studentCode);
      }
    }

    function courseDetail() {
      const c = getSelectedCourse();
      if (!c) {
        state.view = "dashboard";
        return dashboard();
      }

      const tab = state.detailTab || "schedule";
      const td = todayStr();
      const lessons = (c.lessons || [])
        .filter(l => l.title || l.date || l.handout || l.replay || l.agvLink)
        .sort((a, b) => (a.date || "").localeCompare(b.date || ""));

      const tabButtons = `
        <div class="tabs">
          <button class="tab ${tab === "schedule" ? "active" : ""}" onclick="setDetailTab('schedule')">${icon("ti-calendar", "")} Schedule</button>
          <button class="tab ${tab === "handouts" ? "active" : ""}" onclick="setDetailTab('handouts')">${icon("ti-file-description", "")} Handouts</button>
          <button class="tab ${tab === "replays" ? "active" : ""}" onclick="setDetailTab('replays')">${icon("ti-player-play", "")} Replays</button>
        </div>
      `;

      let content = "";

      if (tab === "schedule") {
        content = lessons.length ? lessons.map(l => {
          const isToday = l.date === td;
          const isPast = l.date && l.date < td;
          return `
            <div class="lesson-card ${isToday ? "today" : ""} ${isPast && !isToday ? "past" : ""}">
              <div class="card-top" style="align-items:center;">
                <div style="min-width:0;">
                  <div class="lesson-title">
                    ${escapeHtml(l.title || "Untitled Lesson")}
                    ${isToday ? `<span class="today-badge">TODAY</span>` : ""}
                  </div>
                  <div class="lesson-meta">${fmtDate(l.date)}${l.time ? " · " + escapeHtml(l.time) : ""}${isPast && !isToday ? " · past" : ""}</div>
                  ${l.notes ? `<div class="small-muted" style="margin-top:6px;">${escapeHtml(l.notes)}</div>` : ""}
                </div>
                <div class="lesson-actions">
                  ${l.agvLink ? btn(`${icon("ti-video", "")} AGV`, `openUrl('${encodeURIComponent(l.agvLink)}')`, "teal", true) : ""}
                  ${l.handout ? btn(`${icon("ti-download", "")} Handout`, `openUrl('${encodeURIComponent(l.handout)}')`, "secondary", true) : ""}
                  ${l.replay ? btn(`${icon("ti-player-play", "")} Replay`, `openUrl('${encodeURIComponent(l.replay)}')`, "secondary", true) : ""}
                </div>
              </div>
            </div>
          `;
        }).join("") : `<div class="empty-card">No lessons added yet. Edit the course to add schedule items.</div>`;
      }

      if (tab === "handouts") {
        const handouts = lessons.filter(l => l.handout);
        content = handouts.length ? handouts.map(l => `
          <div class="lesson-card">
            <div class="card-top" style="align-items:center;">
              <div>
                <div class="lesson-title">${escapeHtml(l.title || "Lesson Handout")}</div>
                <div class="lesson-meta">${fmtDate(l.date)}</div>
              </div>
              ${btn(`${icon("ti-download", "")} Open Handout`, `openUrl('${encodeURIComponent(l.handout)}')`, "secondary", true)}
            </div>
          </div>
        `).join("") : `<div class="empty-card">No handout links have been added yet.</div>`;
      }

      if (tab === "replays") {
        const replays = lessons.filter(l => l.replay);
        content = replays.length ? replays.map(l => `
          <div class="lesson-card">
            <div class="card-top" style="align-items:center;">
              <div>
                <div class="lesson-title">${escapeHtml(l.title || "Lesson Replay")}</div>
                <div class="lesson-meta">${fmtDate(l.date)}</div>
              </div>
              ${btn(`${icon("ti-player-play", "")} Watch Replay`, `openUrl('${encodeURIComponent(l.replay)}')`, "", true)}
            </div>
          </div>
        `).join("") : `<div class="empty-card">No replay links have been added yet.</div>`;
      }

      return `
        ${header(c.title || "Course Detail", `
          ${btn(`${icon(state.copiedId === c.id ? "ti-check" : "ti-link", "")} ${state.copiedId === c.id ? "Copied" : "Student Link"}`, `copyLink('${c.id}')`, "secondary", true)}
          ${btn(`${icon("ti-edit", "")} Edit`, `openBuilder('${c.id}')`, "secondary", true)}
          ${btn(`${icon("ti-trash", "")}`, `deleteCourse('${c.id}')`, "danger", true)}
        `)}
        <section class="page">
          <div class="info-card">
            <div class="info-grid">
              <div>
                <span class="field-label">Instructor</span>
                <strong>${escapeHtml(c.instructor || "—")}</strong>
              </div>
              <div>
                <span class="field-label">Lessons</span>
                <strong>${(c.lessons || []).length}</strong>
              </div>
              <div>
                <span class="field-label">Student Code</span>
                <code class="class-code">${escapeHtml(c.studentCode)}</code>
              </div>
              ${c.description ? `
                <div style="flex:1 0 100%;">
                  <span class="field-label">Description</span>
                  <p style="margin-bottom:0;">${escapeHtml(c.description)}</p>
                </div>` : ""}
            </div>
          </div>

          ${tabButtons}
          <div class="stack">${content}</div>
        </section>
      `;
    }

    function setDetailTab(tab) {
      state.detailTab = tab;
      render();
    }

    function openUrl(encoded) {
      const url = decodeURIComponent(encoded);
      window.open(url, "_blank", "noopener,noreferrer");
    }

    function studentEntry() {
      return `
        ${header("Student Portal", btn(`${icon("ti-chalkboard", "")} Teacher Dashboard`, "openDashboard()", "secondary", true))}
        <section class="center-page">
          <div class="entry-card">
            <div class="entry-icon">${icon("ti-user-graduate", "S")}</div>
            <h2>Join a Class</h2>
            <p>Enter the 6-character code your teacher shared with you.</p>
            <div class="field-block">
              <input
                class="student-code-input"
                id="studentCodeInput"
                value="${escapeHtml(state.codeInput)}"
                placeholder="ABC123"
                maxlength="6"
                oninput="handleCodeInput(this.value)"
                onkeydown="if(event.key === 'Enter') joinCourse()"
                autofocus
              />
            </div>
            ${btn("Join Class →", "joinCourse()", "", false, state.codeInput.length !== 6)}
          </div>
          <div class="copy-note">
            Teacher? <button class="btn ghost small" onclick="openDashboard()">Go to dashboard →</button>
          </div>
        </section>
      `;
    }

    function handleCodeInput(value) {
      state.codeInput = String(value).toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 6);
      const input = document.getElementById("studentCodeInput");
      if (input && input.value !== state.codeInput) input.value = state.codeInput;
      render();
      const next = document.getElementById("studentCodeInput");
      if (next) {
        next.focus();
        next.setSelectionRange(next.value.length, next.value.length);
      }
    }

    function joinCourse() {
      const code = (state.codeInput || "").trim().toUpperCase();
      const found = state.courses.find(c => c.studentCode === code);
      if (!found) {
        showToast("Code not found. Check with your teacher.");
        return;
      }
      state.studentCourseId = found.id;
      state.view = "student-view";
      render();
    }

    function studentView() {
      const c = getStudentCourse();
      if (!c) {
        state.view = "student-entry";
        return studentEntry();
      }

      const td = todayStr();
      const lessons = (c.lessons || [])
        .filter(l => l.title || l.date || l.handout || l.replay || l.agvLink)
        .sort((a, b) => (a.date || "").localeCompare(b.date || ""));
      const todayLessons = lessons.filter(l => l.date === td);
      const resources = lessons.filter(l => l.handout || l.replay);

      const todayBlock = todayLessons.length ? `
        <div style="margin-bottom:24px;">
          <div class="section-title">Today's Class</div>
          <div class="stack">
            ${todayLessons.map(l => `
              <div class="lesson-card today">
                <div class="lesson-title">${escapeHtml(l.title || "Today's Lesson")} <span class="today-badge">TODAY</span></div>
                <div class="lesson-meta">${fmtDate(l.date)}${l.time ? " · " + escapeHtml(l.time) : ""}</div>
                ${l.notes ? `<p style="margin:10px 0 13px;">${escapeHtml(l.notes)}</p>` : ""}
                <div class="lesson-actions" style="justify-content:flex-start;">
                  ${l.agvLink ? btn(`${icon("ti-video", "")} Watch Live on AGV`, `openUrl('${encodeURIComponent(l.agvLink)}')`, "teal") : ""}
                  ${l.handout ? btn(`${icon("ti-download", "")} Download Handout`, `openUrl('${encodeURIComponent(l.handout)}')`, "secondary") : ""}
                  ${l.replay ? btn(`${icon("ti-player-play", "")} Watch Replay`, `openUrl('${encodeURIComponent(l.replay)}')`, "secondary") : ""}
                </div>
              </div>
            `).join("")}
          </div>
        </div>
      ` : "";

      const schedule = lessons.length ? lessons.map(l => {
        const isToday = l.date === td;
        const isPast = l.date && l.date < td;
        return `
          <div class="lesson-card ${isToday ? "today" : ""} ${isPast && !isToday ? "past" : ""}">
            <div class="card-top" style="align-items:center;">
              <div style="min-width:0;">
                <div class="lesson-title">${escapeHtml(l.title || "Lesson")}</div>
                <div class="lesson-meta">${fmtDate(l.date)}${l.time ? " · " + escapeHtml(l.time) : ""}</div>
              </div>
              <div class="lesson-actions">
                ${l.agvLink ? `<a class="resource-link" target="_blank" rel="noreferrer" href="${escapeHtml(l.agvLink)}">${icon("ti-video", "")} Live</a>` : ""}
                ${l.handout ? `<a class="resource-link" target="_blank" rel="noreferrer" href="${escapeHtml(l.handout)}">${icon("ti-download", "")} Handout</a>` : ""}
                ${l.replay ? `<a class="resource-link" target="_blank" rel="noreferrer" href="${escapeHtml(l.replay)}">${icon("ti-player-play", "")} Replay</a>` : ""}
              </div>
            </div>
          </div>
        `;
      }).join("") : `<div class="empty-card">No schedule posted yet.</div>`;

      const resourceCards = resources.length ? resources.map(l => `
        <div class="lesson-card">
          <div class="lesson-title">${escapeHtml(l.title || "Lesson Resource")}</div>
          <div class="lesson-meta" style="margin-bottom:10px;">${fmtDate(l.date)}</div>
          <div style="display:flex; gap:7px; flex-wrap:wrap;">
            ${l.handout ? `<a class="resource-link" target="_blank" rel="noreferrer" href="${escapeHtml(l.handout)}">${icon("ti-download", "")} Handout</a>` : ""}
            ${l.replay ? `<a class="resource-link" target="_blank" rel="noreferrer" href="${escapeHtml(l.replay)}">${icon("ti-player-play", "")} Replay</a>` : ""}
          </div>
        </div>
      `).join("") : `<div class="empty-card">No resources posted yet.</div>`;

      return `
        ${header(c.title || "Student Class", btn(`${icon("ti-arrow-left", "")} Switch Class`, "openStudentEntry()", "secondary", true))}
        <section class="page">
          <div class="student-banner">
            <div>
              <h2 style="margin-bottom:4px;">${escapeHtml(c.title)}</h2>
              <div style="color:var(--text-soft);">with ${escapeHtml(c.instructor || "your instructor")}</div>
              ${c.description ? `<p style="margin:10px 0 0;">${escapeHtml(c.description)}</p>` : ""}
            </div>
            <code class="class-code">${escapeHtml(c.studentCode)}</code>
          </div>

          ${todayBlock}

          <div class="two-col">
            <div>
              <div class="section-title">Class Schedule</div>
              <div class="stack">${schedule}</div>
            </div>
            <div>
              <div class="section-title">Resources</div>
              <div class="stack">${resourceCards}</div>
            </div>
          </div>
        </section>
      `;
    }

    function render() {
      let html = "";
      if (state.view === "landing") html = landing();
      if (state.view === "dashboard") html = dashboard();
      if (state.view === "builder") html = builder();
      if (state.view === "detail") html = courseDetail();
      if (state.view === "student-entry") html = studentEntry();
      if (state.view === "student-view") html = studentView();

      app.innerHTML = html;

      const input = document.querySelector("[autofocus]");
      if (input) setTimeout(() => input.focus(), 0);
    }

    function initFromHash() {
      const hash = window.location.hash.replace("#", "").trim().toUpperCase();
      if (/^[A-Z0-9]{6}$/.test(hash)) {
        state.codeInput = hash;
        const found = state.courses.find(c => c.studentCode === hash);
        if (found) {
          state.studentCourseId = found.id;
          state.view = "student-view";
        } else {
          state.view = "student-entry";
        }
      }
    }

    window.addEventListener("hashchange", () => {
      initFromHash();
      render();
    });

    load();
    initFromHash();
    render();
  </script>
</body>
</html>
