<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stro Chievery</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
<!-- AGV COMPACT CONTROL CENTER START -->
<style id="agv-compact-control-center-style">
  /*
    AGV CLIENT:
    Compact the Control Center — Host Tools area without removing tools.
  */

  .agv-control-center-compact-card {
    max-height: calc(100vh - 185px) !important;
    overflow-y: auto !important;
    padding-right: 8px !important;
    scroll-behavior: smooth;
  }

  .agv-control-center-compact-card::-webkit-scrollbar {
    width: 8px;
  }

  .agv-control-center-compact-card::-webkit-scrollbar-thumb {
    background: rgba(250,204,21,0.35);
    border-radius: 999px;
  }

  .agv-control-center-toolbar {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin: 8px 0 12px 0;
    padding: 8px 10px;
    border-radius: 14px;
    border: 1px solid rgba(250,204,21,0.24);
    background: rgba(2,6,23,0.94);
    box-shadow: 0 10px 24px rgba(0,0,0,0.24);
  }

  .agv-control-center-toolbar-title {
    color: #facc15;
    font-size: 12px;
    font-weight: 950;
    letter-spacing: 0.35px;
  }

  .agv-control-center-toolbar button {
    border: 1px solid rgba(250,204,21,0.32);
    background: rgba(250,204,21,0.12);
    color: #fef3c7;
    border-radius: 999px;
    padding: 6px 9px;
    font-size: 11px;
    font-weight: 900;
    cursor: pointer;
  }

  .agv-control-center-compact-card.agv-control-details-hidden .agv-control-long-helper {
    display: none !important;
  }
</style>

<script id="agv-compact-control-center-script">
(function () {
  /*
    AGV CLIENT:
    Finds the current Control Center — Host Tools card and keeps it compact.
  */

  const STORAGE_KEY = "agv_control_center_show_details_v1";

  function getShowDetails() {
    try {
      return localStorage.getItem(STORAGE_KEY) === "true";
    } catch (e) {
      return false;
    }
  }

  function setShowDetails(value) {
    try {
      localStorage.setItem(STORAGE_KEY, value ? "true" : "false");
    } catch (e) {}
  }

  function directText(node) {
    if (!node) return "";
    return Array.from(node.childNodes || [])
      .filter(function (child) { return child.nodeType === Node.TEXT_NODE; })
      .map(function (child) { return String(child.textContent || "").trim(); })
      .filter(Boolean)
      .join(" ")
      .trim();
  }

  function findControlCenterCard() {
    const title = Array.from(document.querySelectorAll("div"))
      .find(function (node) {
        return String(node.textContent || "").trim() === "Control Center — Host Tools";
      });

    if (!title) return null;

    let node = title.parentElement;

    while (node && node !== document.body) {
      const text = String(node.textContent || "");
      if (
        text.includes("Plan & Authority") &&
        text.includes("Tickets & Revenue") &&
        text.includes("Vendor Financial Hub")
      ) {
        return node;
      }
      node = node.parentElement;
    }

    return title.parentElement || null;
  }

  function installToolbar(card) {
    if (!card || card.querySelector(".agv-control-center-toolbar")) return;

    const toolbar = document.createElement("div");
    toolbar.className = "agv-control-center-toolbar";
    toolbar.innerHTML = `
      <div class="agv-control-center-toolbar-title">Compact Host Tools</div>
      <button type="button" id="agv-toggle-control-center-details">Show Details</button>
    `;

    const title = Array.from(card.querySelectorAll("div"))
      .find(function (node) {
        return String(node.textContent || "").trim() === "Control Center — Host Tools";
      });

    if (title && title.parentElement) {
      title.parentElement.insertBefore(toolbar, title.nextSibling);
    } else {
      card.insertBefore(toolbar, card.firstChild);
    }

    const button = toolbar.querySelector("#agv-toggle-control-center-details");
    if (button) {
      button.addEventListener("click", function () {
        const next = !getShowDetails();
        setShowDetails(next);
        applyCompactControlCenter();
      });
    }
  }

  function markLongHelperText(card) {
    if (!card) return;

    const nodes = Array.from(card.querySelectorAll("div, p"));

    nodes.forEach(function (node) {
      if (node.closest(".agv-control-center-toolbar")) return;

      const hasFormControl = node.querySelector("button, input, textarea, select");
      if (hasFormControl) return;

      const ownText = directText(node);
      const fullText = String(node.textContent || "").trim();

      const isLongLeafText =
        ownText.length > 90 ||
        (
          node.children.length === 0 &&
          fullText.length > 110
        );

      const isKeepVisible =
        fullText.includes("Current Plan:") ||
        fullText.includes("Room Limit:") ||
        fullText.includes("Private Rooms:") ||
        fullText.includes("AGV Host/Vendor Agreement Required");

      if (isLongLeafText && !isKeepVisible) {
        node.classList.add("agv-control-long-helper");
      }
    });
  }

  function applyCompactControlCenter() {
    const card = findControlCenterCard();
    if (!card) return;

    card.classList.add("agv-control-center-compact-card");

    installToolbar(card);
    markLongHelperText(card);

    const showDetails = getShowDetails();

    if (showDetails) {
      card.classList.remove("agv-control-details-hidden");
    } else {
      card.classList.add("agv-control-details-hidden");
    }

    const button = card.querySelector("#agv-toggle-control-center-details");
    if (button) {
      button.textContent = showDetails ? "Hide Details" : "Show Details";
    }
  }

  applyCompactControlCenter();
  setInterval(applyCompactControlCenter, 1200);
})();
</script>
<!-- AGV COMPACT CONTROL CENTER END -->
<!-- AGV CLEAN CONVENTION BINGO ADDON START -->
<style id="agv-clean-convention-bingo-addon-style">
  /*
    AGV CLIENT:
    Clean final Bingo Add-On behavior.
    Convention tier only.
    Tiny dice icon by default.
    Click opens panel.
    Panel stays open.
    Close button closes panel.
    No hover expansion.
  */

  #agv-clean-bingo-addon {
    display: none;
  }

  body.agv-convention-tier-active #agv-clean-bingo-addon {
    display: block;
  }

  #agv-clean-bingo-addon {
    position: fixed;
    right: 12px;
    bottom: 12px;
    z-index: 999999;
    font-family: Arial, sans-serif;
  }

  #agv-clean-bingo-addon-icon {
    width: 38px;
    height: 38px;
    border-radius: 999px;
    border: 1px solid rgba(250,204,21,0.45);
    background: rgba(2,6,23,0.84);
    color: #facc15;
    box-shadow: 0 6px 16px rgba(0,0,0,0.24);
    cursor: pointer;
    font-size: 18px;
    line-height: 38px;
    text-align: center;
    padding: 0;
    opacity: 0.78;
  }

  #agv-clean-bingo-addon-icon:hover {
    opacity: 1;
  }

  #agv-clean-bingo-addon-panel {
    display: none;
    width: 280px;
    max-width: calc(100vw - 28px);
    max-height: 70vh;
    overflow-y: auto;
    border-radius: 16px;
    border: 1px solid rgba(250,204,21,0.45);
    background: linear-gradient(180deg, rgba(15,23,42,0.98), rgba(2,6,23,0.98));
    color: #f8fafc;
    box-shadow: 0 16px 36px rgba(0,0,0,0.36);
    padding: 12px;
  }

  #agv-clean-bingo-addon.agv-open #agv-clean-bingo-addon-icon {
    display: none;
  }

  #agv-clean-bingo-addon.agv-open #agv-clean-bingo-addon-panel {
    display: block;
  }

  #agv-clean-bingo-addon .agv-bingo-badge {
    display: inline-block;
    margin-bottom: 8px;
    padding: 4px 8px;
    border-radius: 999px;
    background: rgba(250,204,21,0.14);
    border: 1px solid rgba(250,204,21,0.35);
    color: #facc15;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 0.4px;
  }

  #agv-clean-bingo-addon .agv-bingo-title {
    color: #facc15;
    font-weight: 950;
    font-size: 14px;
    margin-bottom: 6px;
  }

  #agv-clean-bingo-addon .agv-bingo-text {
    color: rgba(248,250,252,0.80);
    font-size: 11px;
    line-height: 1.45;
    margin-bottom: 10px;
  }

  #agv-clean-bingo-addon .agv-bingo-small {
    color: rgba(248,250,252,0.62);
    font-size: 10px;
    line-height: 1.35;
    margin-top: 8px;
  }

  #agv-clean-bingo-addon button {
    width: 100%;
    border-radius: 12px;
    border: 0;
    padding: 8px 9px;
    font-size: 11px;
    font-weight: 950;
    cursor: pointer;
    margin-top: 7px;
  }

  #agv-clean-bingo-addon .agv-primary {
    color: #020617;
    background: linear-gradient(135deg, #facc15, #f97316);
  }

  #agv-clean-bingo-addon .agv-secondary {
    color: #f8fafc;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
  }
</style>

<script id="agv-clean-convention-bingo-addon-script">
(function () {
  if (window.__AGV_CLEAN_BINGO_ADDON__) return;
  window.__AGV_CLEAN_BINGO_ADDON__ = true;

  const ADDON_REQUEST_KEY = "agv_bingo_addon_purchase_requested";
  const ADDON_ACTIVE_KEY = "agv_bingo_addon_active";

  function normalizePlan(value) {
    return String(value || "FREE").trim().toUpperCase();
  }

  function getStoredPlan() {
    try {
      return normalizePlan(
        localStorage.getItem("agv_current_plan") ||
        localStorage.getItem("agv_viewer_plan") ||
        "FREE"
      );
    } catch (e) {
      return "FREE";
    }
  }

  function pageLooksConvention() {
    const text = String(document.body && document.body.innerText || "").toUpperCase();
    return (
      text.includes("CONVENTION PLAN ACTIVE") ||
      text.includes("CONVENTION HOST") ||
      text.includes("CURRENT PLAN: CONVENTION") ||
      text.includes("ACTIVE PLAN: CONVENTION")
    );
  }

  function isConventionTier() {
    return getStoredPlan() === "CONVENTION" || pageLooksConvention();
  }

  function addonRequested() {
    try {
      return localStorage.getItem(ADDON_REQUEST_KEY) === "true";
    } catch (e) {
      return false;
    }
  }

  function addonActive() {
    try {
      return localStorage.getItem(ADDON_ACTIVE_KEY) === "true";
    } catch (e) {
      return false;
    }
  }

  function openBingoPreview() {
    window.open(
      "http://127.0.0.1:8794/agv-fundraiser-bingo.html?fundraiserId=fundraiser_8655ab17bbd6e7bf&roomId=main-hall&eventId=agv-fundraiser-bingo&cards=4",
      "_blank",
      "noopener,noreferrer"
    );
  }

  function hideOldPublicBingo() {
    Array.from(document.querySelectorAll("a, button, div")).forEach(function (node) {
      if (node.closest && node.closest("#agv-clean-bingo-addon")) return;

      const text = String(node.textContent || "").toLowerCase();
      const href = String(node.getAttribute && node.getAttribute("href") || "").toLowerCase();

      const oldBingo =
        text.includes("fundraiser bingo") ||
        text.includes("enter fundraiser bingo") ||
        text.includes("join fundraiser bingo") ||
        href.includes("agv-fundraiser-bingo") ||
        href.includes("127.0.0.1:8794") ||
        href.includes("localhost:8794");

      if (oldBingo) {
        node.style.display = "none";
        node.style.visibility = "hidden";
        node.style.pointerEvents = "none";
      }
    });
  }

  function ensureAddonShell() {
    let box = document.getElementById("agv-clean-bingo-addon");

    if (!box) {
      box = document.createElement("div");
      box.id = "agv-clean-bingo-addon";
      box.innerHTML = `
        <button type="button" id="agv-clean-bingo-addon-icon" title="Bingo Add-On">🎲</button>
        <div id="agv-clean-bingo-addon-panel"></div>
      `;
      document.body.appendChild(box);

      document.getElementById("agv-clean-bingo-addon-icon").addEventListener("click", function () {
        box.classList.add("agv-open");
      });
    }

    return box;
  }

  function renderPanel() {
    hideOldPublicBingo();

    const convention = isConventionTier();

    if (convention) {
      document.body.classList.add("agv-convention-tier-active");
    } else {
      document.body.classList.remove("agv-convention-tier-active");
    }

    const box = ensureAddonShell();

    if (!convention) {
      box.classList.remove("agv-open");
      return;
    }

    const active = addonActive();
    const requested = addonRequested();
    const panel = document.getElementById("agv-clean-bingo-addon-panel");

    if (!panel) return;

    panel.innerHTML = `
      <div class="agv-bingo-badge">CONVENTION CUSTOM OPTION</div>
      <div class="agv-bingo-title">Fundraiser Bingo Add-On</div>
      <div class="agv-bingo-text">
        Convention-tier custom add-on for ticketed fundraising, paid cards,
        caller mode, prize tracking, and controlled event play.
      </div>

      ${
        active
          ? `
            <button type="button" class="agv-primary" id="agv-clean-open-bingo">Open Fundraiser Bingo Add-On</button>
            <div class="agv-bingo-small">Status: Add-On Active</div>
          `
          : requested
          ? `
            <button type="button" class="agv-primary" id="agv-clean-open-bingo">Open Local Add-On Preview</button>
            <div class="agv-bingo-small">
              Status: Purchase request saved locally. Stripe checkout can be connected after a Bingo Add-On price ID is added.
            </div>
          `
          : `
            <button type="button" class="agv-primary" id="agv-clean-purchase-bingo">Purchase Bingo Add-On</button>
            <div class="agv-bingo-small">
              Hidden from regular users. Available only for Convention-tier accounts.
            </div>
          `
      }

      <button type="button" class="agv-secondary" id="agv-clean-close-bingo">Close</button>
    `;

    const purchase = document.getElementById("agv-clean-purchase-bingo");
    if (purchase) {
      purchase.onclick = function () {
        try {
          localStorage.setItem(ADDON_REQUEST_KEY, "true");
        } catch (e) {}
        alert("Bingo Add-On purchase request saved. Next step is connecting the real Stripe Add-On price ID.");
        renderPanel();
        box.classList.add("agv-open");
      };
    }

    const open = document.getElementById("agv-clean-open-bingo");
    if (open) {
      open.onclick = openBingoPreview;
    }

    const close = document.getElementById("agv-clean-close-bingo");
    if (close) {
      close.onclick = function () {
        box.classList.remove("agv-open");
      };
    }
  }

  renderPanel();
  setInterval(renderPanel, 1000);
})();
</script>
<!-- AGV CLEAN CONVENTION BINGO ADDON END -->
</body>
</html>
